<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vicente Tomás | Fontanería Valencia | 675 87 93 29</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(3, 47, 64, 0.9), transparent);
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
        }
        .nav-logo img { width: 45px; height: auto; }
        .nav-logo-name { font-size: 1rem; font-weight: 700; color: #38BDF8; }
        .nav-phone {
            padding: 10px 20px;
            background: rgba(56, 189, 248, 0.2);
            border: 2px solid #38BDF8;
            border-radius: 25px;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .nav-phone:hover { background: #38BDF8; }
        .scroll-section { height: 600vh; position: relative; }
        .canvas-container {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        #animationCanvas {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #032f40;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.5s ease;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loading-text { font-size: 1rem; color: #38BDF8; margin-bottom: 15px; }
        .loading-progress { font-size: 2rem; font-weight: 700; }
        .loading-bar {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            background: #38BDF8;
            width: 0%;
            transition: width 0.3s ease;
        }
        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0.8;
            transition: opacity 0.3s ease;
            z-index: 100;
        }
        .scroll-indicator.fade-out { opacity: 0; }
        .scroll-mouse {
            width: 24px;
            height: 38px;
            border: 2px solid #38BDF8;
            border-radius: 12px;
            position: relative;
        }
        .scroll-mouse::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 8px;
            background: #38BDF8;
            border-radius: 2px;
            animation: scrollDown 1.5s infinite;
        }
        @keyframes scrollDown {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(12px); }
        }
        .scroll-text { font-size: 0.7rem; color: #38BDF8; letter-spacing: 2px; }
        .frame-counter {
            position: fixed;
            top: 80px;
            right: 20px;
            font-size: 0.8rem;
            opacity: 0.6;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-text">Cargando animación...</div>
        <div class="loading-progress" id="loadingProgress">0%</div>
        <div class="loading-bar">
            <div class="loading-bar-fill" id="loadingBarFill"></div>
        </div>
    </div>

    <nav class="nav">
        <a href="#" class="nav-logo">
            <img src="https://assets.zyrosite.com/5SVCo0KGnglwB9nV/fontaneriia-vicente-XdKkx5hV2W1SwOO0.webp" alt="">
            <span class="nav-logo-name">Fontanería Vicente</span>
        </a>
        <a href="tel:675879329" class="nav-phone">📞 675 87 93 29</a>
    </nav>

    <div class="scroll-indicator" id="scrollIndicator">
        <div class="scroll-mouse"></div>
        <div class="scroll-text">SCROLL</div>
    </div>

    <div class="frame-counter" id="frameCounter">0 / 302</div>

    <section class="scroll-section" id="scrollSection">
        <div class="canvas-container">
            <canvas id="animationCanvas"></canvas>
        </div>
    </section>

    <script>
        const VIDEO_CONFIG = {
            totalFrames: 302,
            width: 480,
            height: 640
        };

        const state = {
            frames: [],
            currentFrame: 0,
            lastDrawnFrame: -1,
            isLoading: true
        };

        const canvas = document.getElementById('animationCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingProgress = document.getElementById('loadingProgress');
        const loadingBarFill = document.getElementById('loadingBarFill');
        const scrollIndicator = document.getElementById('scrollIndicator');
        const frameCounter = document.getElementById('frameCounter');
        const scrollSection = document.getElementById('scrollSection');

        function setupCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const maxWidth = window.innerWidth;
            const maxHeight = window.innerHeight;

            const videoAspect = VIDEO_CONFIG.width / VIDEO_CONFIG.height;
            const viewportAspect = maxWidth / maxHeight;

            let displayWidth, displayHeight;

            if (videoAspect > viewportAspect) {
                displayWidth = maxWidth;
                displayHeight = maxWidth / videoAspect;
            } else {
                displayHeight = maxHeight;
                displayWidth = maxHeight * videoAspect;
            }

            canvas.style.width = displayWidth + 'px';
            canvas.style.height = displayHeight + 'px';
            canvas.width = displayWidth * dpr;
            canvas.height = displayHeight * dpr;
            ctx.scale(dpr, dpr);
        }

        async function preloadFrames() {
            let loaded = 0;

            for (let i = 1; i <= VIDEO_CONFIG.totalFrames; i++) {
                const frameNumber = i.toString().padStart(4, '0');
                const framePath = 'frames/frame_' + frameNumber + '.png';

                const img = new Image();

                await new Promise((resolve) => {
                    img.onload = () => {
                        state.frames.push(img);
                        loaded++;
                        const progress = Math.round((loaded / VIDEO_CONFIG.totalFrames) * 100);
                        loadingProgress.textContent = progress + '%';
                        loadingBarFill.style.width = progress + '%';
                        resolve();
                    };
                    img.onerror = () => {
                        state.frames.push(null);
                        resolve();
                    };
                    img.src = framePath;
                });
            }

            state.isLoading = false;

            setTimeout(() => {
                loadingOverlay.classList.add('hidden');
            }, 300);
        }

        function drawFrame(frameIndex) {
            if (state.isLoading || frameIndex === state.lastDrawnFrame) return;

            const frame = state.frames[frameIndex];
            if (!frame) return;

            const displayWidth = parseFloat(canvas.style.width);
            const displayHeight = parseFloat(canvas.style.height);

            ctx.clearRect(0, 0, displayWidth, displayHeight);
            ctx.drawImage(frame, 0, 0, displayWidth, displayHeight);

            state.lastDrawnFrame = frameIndex;
            frameCounter.textContent = (frameIndex + 1) + ' / ' + VIDEO_CONFIG.totalFrames;
        }

        function getFrameFromScroll() {
            const rect = scrollSection.getBoundingClientRect();
            const sectionHeight = scrollSection.offsetHeight;
            const viewportHeight = window.innerHeight;

            const scrolled = -rect.top;
            const scrollableDistance = sectionHeight - viewportHeight;

            let scrollFraction = scrolled / scrollableDistance;
            scrollFraction = Math.max(0, Math.min(1, scrollFraction));

            return Math.floor(scrollFraction * (VIDEO_CONFIG.totalFrames - 1));
        }

        let ticking = false;

        function onScroll() {
            if (window.scrollY > 100) {
                scrollIndicator.classList.add('fade-out');
            }

            if (!ticking) {
                requestAnimationFrame(() => {
                    const frameIndex = getFrameFromScroll();

                    if (frameIndex !== state.currentFrame) {
                        state.currentFrame = frameIndex;
                        drawFrame(frameIndex);
                    }

                    ticking = false;
                });

                ticking = true;
            }
        }

        async function init() {
            setupCanvas();
            await preloadFrames();
            drawFrame(0);

            window.addEventListener('scroll', onScroll, { passive: true });

            window.addEventListener('resize', () => {
                setupCanvas();
                drawFrame(state.currentFrame);
            });
        }

        init();
    </script>
</body>
</html>
